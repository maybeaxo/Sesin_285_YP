{% extends 'base.html' %}
{% block title %}Ошибка {{ code }}{% endblock %}
{% block content %}
<div class="text-center py-5">
  <h1 class="display-5">Ошибка {{ code }}</h1>
  <p class="lead">{{ message }}</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}">Вернуться</a>
</div>
{% endblock %}
